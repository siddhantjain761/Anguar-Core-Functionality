<div class="right-widget recent-post">
  <h3>Recent Blogs</h3>
  <span *ngFor="let data of blogdata">
  <a href="#">
      <div class="rb-box">
          <div class="rb-box-img">
              <img src="http://127.0.0.1:8000/upload/blog/{{data.image}}" alt="blog1" />
          </div>
          <div class="rb-box-desc">
              <h4>Sample blog post {{data.id}}</h4>
              <p>Posted On: {{data.created_at | date}}</p>
          </div>
      </div>
  </a>
</span>


</div>
